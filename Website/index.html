<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEV-01 Command Center</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h1>DEV-01 NODE MANAGEMENT</h1>
    <p>SYSTEM STATUS: <span id="status-text">INITIALIZING...</span></p>
  </header>

  <main id="system-status">
    <div class="status-card cpu">
      <h3>CPU LOAD</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>

    <div class="status-card ram">
      <h3>MEMORY USAGE</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>

    <div class="status-card network">
      <h3>GPU UTILIZATION</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>

    <div class="status-card storage">
      <h3>DISK CAPACITY</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>
  </main>

  <section id="console-container">
    <h3>AGENT_THOUGHT_STREAM</h3>
    <div id="log-display"></div>
  </section>

  <section id="command-center">
    <input type="text" id="user-input" placeholder="Enter command for DEV-01..." autocomplete="off">
    <button id="send-btn">EXECUTE</button>
  </section>

  <script src="app.js"></script>
</body>

</html>
