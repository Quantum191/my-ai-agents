<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEV-01 Autonomous Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h1>DEV-01 Node Management</h1>
    <p>System Status: <span id="status-text">INITIALIZING...</span></p>
  </header>

  <main id="system-status">
    <div class="status-card cpu">
      <h3>CPU Usage</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>

    <div class="status-card ram">
      <h3>RAM Usage</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>

    <div class="status-card network">
      <h3>GPU Load</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>

    <div class="status-card storage">
      <h3>Storage Used</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>
  </main>

  <section id="console-container">
    <h3>Agent Thought Stream</h3>
    <div id="log-display">
    </div>
  </section>

  <script src="app.js"></script>
</body>

</html>
