<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEV-01 Command Center</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h1>DEV-01 NODE MANAGEMENT</h1>
    <div id="digital-clock">00:00:00</div>
    <p>AGENT STATUS: <span id="status-text" class="status-idle">Idle</span></p>

    <div id="step-progress"></div>
  </header>

  <main id="system-status">
    <div class="status-card cpu">
      <h3>CPU</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>
    <div class="status-card ram">
      <h3>RAM</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>
    <div class="status-card network">
      <h3>GPU</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>
    <div class="status-card storage">
      <h3>DISK</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>
    <div class="status-card cpu-temp">
      <h3>CPU TEMP</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>
    <div class="status-card gpu-temp">
      <h3>GPU TEMP</h3>
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>
  </main>

  <section id="log-container">
    <div class="container-header">
      <span>AGENT_THOUGHT_STREAM</span>
      <div class="header-actions">
        <button id="cleanup-btn">CLEANUP</button>
        <button id="clear-btn">CLEAR</button>
      </div>
    </div>
    <div id="log-display"></div>
  </section>

  <section id="command-center">
    <input type="text" id="user-input" placeholder="Enter command for DEV-01..." autocomplete="off">
    <button id="send-btn">EXECUTE</button>
    <button id="abort-btn" class="hidden">ABORT TASK</button>
  </section>

  <section id="response-box" class="hidden">
    <div class="response-header">MISSION_REPORT:</div>
    <div id="response-content"></div>
  </section>

  <script src="app.js"></script>
</body>

</html>
